# Fly.io deployment for the Tally demo API (org: mcpcloud-demos).
# Provisioning, in order:
#   fly apps create tally-mcpcloud-demo --org mcpcloud-demos
#   fly postgres create --name tally-mcpcloud-demo-db --org mcpcloud-demos
#   fly postgres attach tally-mcpcloud-demo-db --app tally-mcpcloud-demo
#   fly secrets set DEMO_API_KEY=<key> --app tally-mcpcloud-demo
#   fly deploy

app = "tally-mcpcloud-demo"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  SEED_ON_STARTUP = "true"
  ENABLE_DISPUTES = "false"
  ENABLE_TRAFFIC_GENERATOR = "true"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    method = "GET"
    path = "/healthz"
    interval = "15s"
    timeout = "2s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
